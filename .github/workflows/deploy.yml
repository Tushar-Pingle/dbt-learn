name: Deploy dbt Academy to GitHub Pages

# Publishes the static site to GitHub Pages.
# One-time setup in the repo: Settings → Pages → Build and deployment → Source: "GitHub Actions".
# After that, every push to the default branch (or a manual run) redeploys the site.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # the whole repo IS the site (no build step)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
