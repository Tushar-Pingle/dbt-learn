<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dbt Academy — Governance, Testing &amp; CI/CD</title>
  <meta name="description" content="An interactive, hands-on course for dbt model governance, testing &amp; source freshness, and CI/CD with Slim CI. Learn the concepts, when to apply them, and practice in a real in-browser sandbox." />

  <!-- Favicon: a little pipeline node in dbt coral -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23141312'/%3E%3Cpath d='M8 16h6m4 0h6' stroke='%23FF694A' stroke-width='2.4' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='3.6' fill='%23FF694A'/%3E%3Ccircle cx='7' cy='16' r='2.4' fill='%23FFC24B'/%3E%3Ccircle cx='25' cy='16' r='2.4' fill='%2334C77B'/%3E%3C/svg%3E" />

  <!-- Fonts are self-hosted in assets/fonts and declared in css/styles.css (no external requests) -->

  <!-- Set theme before first paint: stored choice → OS preference → dark default -->
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("dbt-academy-v1"));
        var t = s && s.theme;
        if (!t) t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { /* keep default */ }
    })();
  </script>

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#screen">Skip to content</a>

  <div class="app-frame">
    <header class="topbar" id="topbar"><!-- rendered by ui.js --></header>
    <main id="screen" tabindex="-1"><!-- rendered by app.js router --></main>
    <footer class="appfoot">
      <span>dbt Academy — a hands-on, unofficial learning project. Not affiliated with dbt Labs.</span>
      <span class="appfoot-dot">•</span>
      <span>All practice runs locally in your browser.</span>
    </footer>
  </div>

  <div id="toast-root" aria-live="polite" aria-atomic="false"></div>
  <div id="modal-root"></div>

  <!-- Vendored libraries (self-contained, no CDN) -->
  <script src="./vendor/js-yaml.min.js"></script>
  <script src="./vendor/prism-core.js"></script>
  <script src="./vendor/prism-yaml.js"></script>
  <script src="./vendor/prism-sql.js"></script>
  <script src="./vendor/prism-bash.js"></script>
  <script src="./vendor/sql-wasm.js"></script>

  <!-- App code (classic scripts, load order matters) -->
  <script src="./js/state.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/quiz.js"></script>
  <script src="./js/sandbox/governance.js"></script>
  <script src="./js/sandbox/testing.js"></script>
  <script src="./js/sandbox/cicd.js"></script>
  <script src="./js/content/governance.js"></script>
  <script src="./js/content/testing.js"></script>
  <script src="./js/content/cicd.js"></script>
  <script src="./js/content/capstone.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
